version: 2

models:
    - name: stg_race_results
      description: "Stage table for lap data, cleaned and cast from raw strings to proper dats types"
      columns: 
        - name: year
          description: "Season year"
          data_tests: 
            - not_null
            - accepted_values:
                arguments:
                    values: [2025, 2026]
        - name: round_number
          description: "Race/round number within season"
          data_tests: 
            - not_null
        - name: driver
          description: "Three letter driver code"
          data_tests: 
            - not_null
        - name: lap_number
          description: "Lap Number within race"
          data_tests:
            - not_null
        - name: lap_time_sec
          description: "Lap time of driver in secs"
        - name: tyre_compound
          description: "Compund of tyre used. NULL where unavailable"
          data_tests:
            - accepted_values:
                arguments:
                    values: ['SOFT', 'MEDIUM', 'HARD', 'INTERMEDIATE', 'WET']
                config:
                    where: "tyre_compound IS NOT NULL"
        - name: team
          description: "Team of driver"
        - name: driver_number
          description: "Designated driver code number"
        - name: track_status
          description: "Status code of the track"
          data_tests:
            - not_null
        - name: deleted_reason
          description: "Reason for timing deleted. NULL for non-deleted"
        - name: event_name
          description: "Name of race"
          data_tests:
            - not_null
        - name: session_type
          description: "Type of session, either race, qualifying, free practice, should always be R for this data"
          data_tests:
            - not_null
            - accepted_values:
                arguments:
                    values: ['R']
        
